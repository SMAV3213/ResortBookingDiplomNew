version: '3.8'

services:
  # SQL Server Database (без persistent volumes для development)
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: resort-booking-db
    environment:
      SA_PASSWORD: "YourStrongPassword123!"
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrongPassword123!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "127.0.0.1", "-U", "sa", "-P", "YourStrongPassword123!", "-Q", "SELECT 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - resort-network
    restart: unless-stopped

  # Resort Booking API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resort-booking-api
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=ResortBookingDb;User Id=sa;Password=YourStrongPassword123!;TrustServerCertificate=True;Connection Timeout=30;"
      JWT__SecretKey: "your-secret-key-min-32-characters-long!"
      JWT__Issuer: "ResortBookingApp"
      JWT__Audience: "ResortBookingUsers"
      JWT__ExpirationMinutes: "60"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - resort-network
    restart: unless-stopped
    stdin_open: true
    tty: true

networks:
  resort-network:
    driver: bridge
